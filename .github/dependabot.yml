version: 2
updates:
- package-ecosystem: bundler
  directory: "/"
  schedule:
    interval: daily
  open-pull-requests-limit: 10
  versioning-strategy: lockfile-only
  cooldown:
    default-days: 7
    exclude:
    - "waste_exemptions_engine"
  ignore:
  - dependency-name: airbrake
    versions:
    - "< 8"
    - ">= 7.a"
